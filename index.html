<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>円形メトロノーム(シンプル)</title>
<style>
  :root {
    --bg: #F2D27F;
    --text: #7A8A6A;
    --line: #A4B494;
    --dot: #6A5ACD;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    min-height: 100%;
    background: var(--bg);
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }
  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 12px 14px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  h1 { font-size: 15px; letter-spacing: 0.15em; margin: 4px 0 0; font-weight: 600; }

  /* ===== 円形ビジュアライザー(0° = 3時、時計回り) ===== */
  .circle-wrap {
    position: relative;
    width: min(78vw, 64vmin, 360px);
    height: min(78vw, 64vmin, 360px);
    margin: 6px 0;
  }
  .circle {
    position: absolute; inset: 0;
    border: 3px solid var(--line);
    border-radius: 50%;
    z-index: 2;
  }
  /* 拍頭マーク(3時位置)— 細長い二等辺三角形、頂点が中心向き */
  .zero-mark {
    position: absolute;
    top: 50%; right: -22px;
    width: 0; height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-right: 24px solid var(--text);
    transform: translateY(-50%);
    z-index: 3;
  }
  .dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 24px; height: 24px;
    background: var(--dot);
    border-radius: 50%;
    z-index: 4;
    box-shadow: 0 0 8px rgba(106,90,205,0.5);
  }
  .trail {
    position: absolute;
    top: 50%; left: 50%;
    background: var(--dot);
    border-radius: 50%;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
  }
  .beat-number {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(56px, 18vmin, 110px);
    font-weight: 700;
    color: var(--line);
    z-index: 3;
    pointer-events: none;
  }

  /* ===== コントロール ===== */
  .bpm-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    justify-content: center;
  }
  .bpm-display {
    font-size: 34px;
    font-weight: 700;
    min-width: 88px;
    text-align: center;
    color: #6b7b5a;
  }
  .bpm-display small { font-size: 12px; display: block; font-weight: 600; }
  .measure-display {
    font-size: 34px;
    font-weight: 700;
    min-width: 88px;
    text-align: center;
    color: #6b7b5a;
  }
  .measure-display small { font-size: 12px; display: block; font-weight: 600; }
  .measure-display .denom { font-size: 22px; opacity: 0.7; }
  .step-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--line);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
  }
  .step-btn:active { transform: scale(0.93); }
  input[type=range] { width: 90%; accent-color: var(--dot); }

  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
    justify-content: center;
    width: 100%;
  }
  button.main {
    border: none;
    border-radius: 10px;
    padding: 12px 0;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    flex: 1;
    min-width: 90px;
    color: #fff;
    transition: transform 0.06s;
  }
  button.main:active { transform: scale(0.97); }
  #startStop { background: var(--dot); }
  #startStop.running { background: #E53935; }
  #tapTempo { background: var(--line); }

  label.field {
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 12px;
    font-weight: 600;
    min-width: 70px;
    flex: 1;
  }
  input[type=number], select {
    width: 100%;
    font-size: 16px;
    padding: 7px 8px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    background: #fffef8;
    color: #555;
  }
  input[type=number]:disabled, select:disabled {
    background: #e5e2d8;
    color: #aaa;
    border-color: #c8c8bc;
  }
  label.field:has(input:disabled) { opacity: 0.55; }

  .toggle-btn {
    border: 1.5px solid var(--line);
    background: #fffef8;
    color: var(--text);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    flex: 1;
    min-width: 110px;
  }
  .toggle-btn.on {
    background: var(--dot);
    border-color: var(--dot);
    color: #fff;
  }

  .panel {
    width: 100%;
    background: rgba(255,255,255,0.35);
    border-radius: 14px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .panel-title { font-size: 13px; font-weight: 700; text-align: center; }
  .ramp-status { font-size: 12px; text-align: center; min-height: 16px; }
</style>
</head>
<body>
<div class="app">
  <h1>● 円形メトロノーム</h1>

  <!-- 円形ビジュアライザー(1周 = 1拍、拍頭 = 3時) -->
  <div class="circle-wrap" id="circleWrap">
    <div class="circle"></div>
    <div class="zero-mark"></div>
    <div class="beat-number" id="beatNumber">1</div>
    <div class="dot" id="dot"></div>
  </div>

  <!-- BPM・小節カウント -->
  <div class="bpm-row">
    <button class="step-btn" id="bpmDown">−</button>
    <div class="bpm-display"><span id="bpmVal">100</span><small>BPM</small></div>
    <button class="step-btn" id="bpmUp">＋</button>
    <div class="measure-display"><span id="measureVal">—</span><small>小節</small></div>
  </div>
  <input type="range" id="bpmSlider" min="30" max="250" value="100">

  <!-- 開始/停止・タップテンポ -->
  <div class="row">
    <button class="main" id="startStop">開始</button>
    <button class="main" id="tapTempo">タップテンポ</button>
  </div>

  <!-- 練習モード(常時展開) -->
  <div class="panel">
    <div class="panel-title">練習モード(テンポ漸増・漸減)</div>
    <div class="row">
      <label class="field">モード
        <select id="rampMode">
          <option value="off">通常</option>
          <option value="up">2テンポずつUP</option>
          <option value="down">2テンポずつDOWN</option>
        </select>
      </label>
      <label class="field">開始BPM
        <input type="number" id="rampStart" value="100" min="30" max="250">
      </label>
      <label class="field">終了BPM
        <input type="number" id="rampEnd" value="130" min="30" max="250">
      </label>
      <label class="field">小節数
        <input type="number" id="rampMeasures" value="12" min="1" max="99">
      </label>
    </div>
    <div class="ramp-status" id="rampStatus"></div>
  </div>
</div>

<script>
// ====== 固定設定 ======
const BEATS = 4;            // 4/4拍子固定
const CLICK_FREQ = 880;     // Click 1 固定
const VOLUME = 0.5;         // 音量固定

// ====== 要素 ======
const $ = id => document.getElementById(id);
const bpmVal = $('bpmVal'), bpmSlider = $('bpmSlider');
const startStopBtn = $('startStop'), tapTempoBtn = $('tapTempo');
const dot = $('dot'), beatNumber = $('beatNumber'), circleWrap = $('circleWrap');

// ====== 状態 ======
let audioCtx = null;
let isRunning = false;
let bpm = 100;
let schedulerTimer = null;
let rafId = null;
let nextNoteTime = 0;
let beatInMeasure = 0;
let scheduledBeats = [];
let measureCount = 0;
let countInBeatsLeft = 0;   // カウントインは常時ON
let tapTimes = [];

const LOOKAHEAD_MS = 25;
const SCHEDULE_AHEAD = 0.12;

// ====== 角度ヘルパー(0° = 3時、時計回り) ======
function ringTransform(deg, r) {
  return `translate(-50%,-50%) rotate(${deg}deg) translate(${r}px) rotate(${-deg}deg)`;
}

// ====== BPM操作 ======
function setBpm(v) {
  bpm = Math.min(250, Math.max(30, Math.round(v)));
  bpmVal.textContent = bpm;
  bpmSlider.value = bpm;
}
bpmSlider.addEventListener('input', () => setBpm(+bpmSlider.value));
$('bpmUp').addEventListener('click', () => setBpm(bpm + 1));
$('bpmDown').addEventListener('click', () => setBpm(bpm - 1));

// ====== オーディオ ======
function ensureAudio() {
  if (navigator.audioSession) {
    try { navigator.audioSession.type = 'playback'; } catch (e) {}
  }
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function audioNow() {
  if (audioCtx.getOutputTimestamp) {
    const ts = audioCtx.getOutputTimestamp();
    if (ts && typeof ts.contextTime === 'number' && ts.contextTime > 0 && ts.performanceTime > 0) {
      return ts.contextTime + (performance.now() - ts.performanceTime) / 1000;
    }
  }
  const auto = (audioCtx.outputLatency || 0) + (audioCtx.baseLatency || 0);
  return audioCtx.currentTime - auto;
}
function scheduleClick(time) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(CLICK_FREQ, time);
  gain.gain.setValueAtTime(VOLUME, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.02);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(time); osc.stop(time + 0.025);
}

// ====== スケジューラ ======
function scheduler() {
  while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD) {
    const spb = 60 / bpm;

    // カウントイン中
    if (countInBeatsLeft > 0) {
      const num = BEATS - countInBeatsLeft + 1;
      scheduleClick(nextNoteTime);
      scheduledBeats.push({ time: nextNoteTime, num });
      if (scheduledBeats.length > 12) scheduledBeats.shift();
      countInBeatsLeft--;
      if (countInBeatsLeft === 0) $('rampStatus').textContent = '';
      nextNoteTime += spb;
      continue;
    }

    const beatNum = (beatInMeasure % BEATS) + 1;

    if (beatNum === 1) {
      // 小節頭:練習モード処理(1小節目を含め、頭で必ず判定)
      if (beatInMeasure > 0) measureCount++;
      if (applyRamp()) {
        clearInterval(schedulerTimer);
        const delay = Math.max(0, (nextNoteTime - audioCtx.currentTime) * 1000);
        setTimeout(() => {
          if (isRunning) stop();
          $('rampStatus').textContent = `完了! ${$('rampEnd').value} BPM まで到達`;
        }, delay);
        return;
      }
    }

    scheduleClick(nextNoteTime);
    scheduledBeats.push({ time: nextNoteTime, num: beatNum });
    if (scheduledBeats.length > 12) scheduledBeats.shift();

    nextNoteTime += spb;
    beatInMeasure++;
  }
}

// ====== 練習モード ======
function updateRampFieldState() {
  const off = $('rampMode').value === 'off';
  ['rampStart', 'rampEnd', 'rampMeasures'].forEach(id => { $(id).disabled = off; });
}
// モード切替で既定値をセット
const RAMP_PRESETS = {
  up:   { start: 100, end: 130, measures: 12 },
  down: { start: 120, end: 90,  measures: 12 },
};
$('rampMode').addEventListener('change', () => {
  const p = RAMP_PRESETS[$('rampMode').value];
  if (p) {
    $('rampStart').value = p.start;
    $('rampEnd').value = p.end;
    $('rampMeasures').value = p.measures;
  }
  updateRampFieldState();
});
updateRampFieldState();

const RAMP_STEP = 2;
let measuresAtTempo = 0;   // 現テンポで演奏中の小節番号(1始まり)
function applyRamp() {
  const mode = $('rampMode').value;
  if (mode === 'off') { $('measureVal').textContent = '—'; $('rampStatus').textContent = ''; return false; }
  const end = Math.min(250, Math.max(30, +$('rampEnd').value || bpm));
  const perStep = Math.max(1, +$('rampMeasures').value || 1);

  // 直前の段階を弾き終えていたらテンポを進める(2小節目以降の小節頭)
  if (measuresAtTempo >= perStep) {
    const atEnd = (mode === 'up' && bpm >= end) || (mode === 'down' && bpm <= end);
    if (atEnd) return true; // 終了BPMで指定小節数を弾き終えた → 終了
    if (mode === 'up')   setBpm(Math.min(end, bpm + RAMP_STEP));
    if (mode === 'down') setBpm(Math.max(end, bpm - RAMP_STEP));
    measuresAtTempo = 0;
  }
  measuresAtTempo++; // 今から弾く小節(1始まり)
  $('measureVal').innerHTML = `${measuresAtTempo}<span class="denom">/${perStep}</span>`;
  $('rampStatus').textContent = `${bpm} BPM → 終了 ${end} BPM`;
  return false;
}

// ====== ドットの残像 ======
const TRAIL_COUNT = 5;
const trails = [];
for (let i = 0; i < TRAIL_COUNT; i++) {
  const t = document.createElement('div');
  t.className = 'trail';
  const size = 20 - i * 3;
  t.style.width = size + 'px';
  t.style.height = size + 'px';
  circleWrap.appendChild(t);
  trails.push(t);
}
function setTrail(deg, r, degPerFrame) {
  const step = Math.max(2, degPerFrame * 0.9);
  trails.forEach((t, i) => {
    const td = deg - (i + 1) * step;
    t.style.opacity = (0.4 * (1 - i / TRAIL_COUNT)).toFixed(2);
    t.style.transform = ringTransform(td, r);
  });
}
function hideTrail() {
  trails.forEach(t => { t.style.opacity = '0'; });
}

// ====== 描画 ======
let lastShownBeat = null;
let lastFrameTs = 0, frameDur = 1 / 60;
function draw(ts) {
  if (ts && lastFrameTs) {
    frameDur = Math.min(0.05, Math.max(0.008, (ts - lastFrameTs) / 1000));
  }
  if (ts) lastFrameTs = ts;
  const now = audioNow() + frameDur;
  const spb = 60 / bpm;
  let cur = null;
  for (let i = scheduledBeats.length - 1; i >= 0; i--) {
    if (scheduledBeats[i].time <= now) { cur = scheduledBeats[i]; break; }
  }
  if (cur) {
    const progress = Math.min(1, (now - cur.time) / spb);
    const deg = progress * 360;
    const r = circleWrap.offsetWidth / 2;
    dot.style.transform = ringTransform(deg, r);
    setTrail(deg, r, 360 * frameDur / spb);
    if (cur.num !== lastShownBeat) {
      lastShownBeat = cur.num;
      beatNumber.textContent = cur.num;
    }
  }
  rafId = requestAnimationFrame(draw);
}

// ====== 開始/停止 ======
function start() {
  ensureAudio();
  isRunning = true;
  beatInMeasure = 0;
  measureCount = 0;
  scheduledBeats = [];
  lastShownBeat = null;
  lastFrameTs = 0;
  measuresAtTempo = 0;
  if ($('rampMode').value !== 'off') {
    setBpm(+$('rampStart').value || bpm);
  }
  countInBeatsLeft = BEATS; // カウントイン常時ON(1小節分)
  $('rampStatus').textContent = 'カウントイン…';
  nextNoteTime = audioCtx.currentTime + 0.1;
  scheduler();
  schedulerTimer = setInterval(scheduler, LOOKAHEAD_MS);
  rafId = requestAnimationFrame(draw);
  startStopBtn.textContent = '停止';
  startStopBtn.classList.add('running');
}
function stop() {
  isRunning = false;
  clearInterval(schedulerTimer);
  cancelAnimationFrame(rafId);
  startStopBtn.textContent = '開始';
  startStopBtn.classList.remove('running');
  beatNumber.textContent = '1';
  $('measureVal').textContent = '—';
  resetDotPosition();
  $('rampStatus').textContent = '';
}
startStopBtn.addEventListener('click', () => isRunning ? stop() : start());

function resetDotPosition() {
  const r = circleWrap.offsetWidth / 2;
  dot.style.transform = ringTransform(0, r);
  hideTrail();
}
resetDotPosition();
window.addEventListener('resize', () => { if (!isRunning) resetDotPosition(); });

// ====== タップテンポ ======
tapTempoBtn.addEventListener('click', () => {
  const now = performance.now();
  tapTimes.push(now);
  tapTimes = tapTimes.filter(t => now - t < 3000).slice(-5);
  if (tapTimes.length > 1) {
    const iv = [];
    for (let i = 1; i < tapTimes.length; i++) iv.push(tapTimes[i] - tapTimes[i-1]);
    setBpm(60000 / (iv.reduce((a,b)=>a+b,0) / iv.length));
  }
});
</script>
</body>
</html>
